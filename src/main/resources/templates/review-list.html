<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Review List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f0f5;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #c2185b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background-color: #c2185b;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        a.button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #c2185b;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        a.button:hover {
            background-color: #a3154c;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>All Reviews</h2>

    <table>
        <thead>
        <tr>
            <th>Review ID</th>
            <th>Customer Name</th>
            <th>Service Name</th>
            <th>Rating</th>
            <th>Comment</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="review : ${reviews}">
            <td th:text="${review.reviewId}"></td>
            <td th:text="${review.customerName}"></td>
            <td th:text="${review.serviceName}"></td>
            <td th:text="${review.rating}"></td>
            <td th:text="${review.comment}"></td>
            <td>
                <a th:href="@{/editReview(id=${review.reviewId})}">Edit</a>

                <a th:href="@{/deleteReview(id=${review.reviewId})}"
                   onclick="return confirm('Are you sure you want to delete this review?');">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <a class="button" href="/">Back to Review Form</a>
</div>
</body>
</html>
